<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding & Viewport -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Favicon Configuration -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#1a1a1a" />

    <!-- Basic Title and Meta -->
    <title>Fenivi Research - Innovation in Research & Technology</title>
    <meta
      name="description"
      content="Fenivi Research offers cutting-edge research, consulting, and technology solutions. Explore our expertise in innovation, courses, projects, and knowledge resources."
    />
    <meta
      name="keywords"
      content="research, technology, innovation, consulting, courses, projects, knowledge hub, expertise"
    />
    <meta name="author" content="Fenivi Research" />
    <meta name="language" content="English" />
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://fenivi.com" />

    <!-- Open Graph Tags (Social Media) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fenivi.com/" />
    <meta
      property="og:title"
      content="Fenivi Research - Innovation in Research & Technology"
    />
    <meta
      property="og:description"
      content="Discover cutting-edge research solutions, expert consulting, innovative courses, and transformative projects at Fenivi Research."
    />
    <meta property="og:image" content="https://fenivi.com/favicon.png" />
    <meta property="og:site_name" content="Fenivi Research" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://fenivi.com/" />
    <meta
      name="twitter:title"
      content="Fenivi Research - Innovation in Research & Technology"
    />
    <meta
      name="twitter:description"
      content="Discover cutting-edge research solutions, expert consulting, innovative courses, and transformative projects."
    />
    <meta name="twitter:image" content="https://fenivi.com/favicon.png" />
    <meta name="twitter:creator" content="@fenivi" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Fenivi Research",
        "url": "https://fenivi.com",
        "logo": "https://fenivi.com/favicon.png",
        "description": "Innovation in Research & Technology",
        "sameAs": [
          "https://www.facebook.com/fenivi",
          "https://www.twitter.com/fenivi",
          "https://www.linkedin.com/company/fenivi"
        ],
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Service",
          "url": "https://fenivi.com/contact"
        }
      }
    </script>

    <!-- Additional SEO Meta Tags -->
    <link rel="alternate" hreflang="en" href="https://fenivi.com" />
    <meta name="format-detection" content="telephone=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
